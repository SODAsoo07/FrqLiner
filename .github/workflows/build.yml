name: Build Frqliner

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build Windows installer
        required: true
        default: true
        type: boolean
      build_macos:
        description: Build macOS installer
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Electron (Windows)
        env:
          ELECTRON_BUILD: "true"
        run: npm run electron:build:win -- --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: frqliner-windows
          path: release/**
          if-no-files-found: error

  build-macos:
    name: macOS (x64 + arm64)
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Electron (macOS)
        env:
          ELECTRON_BUILD: "true"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run electron:build:mac -- --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: frqliner-macos
          path: release/**
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: frqliner-windows
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: frqliner-macos
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          draft: false
          prerelease: false
          generate_release_notes: true
